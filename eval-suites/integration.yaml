- name: integration-setup-tools
  layer: integration
  tests:
    - name: get-deployment-guide-cloud
      tool: get_deployment_guide
      difficulty: simple
      args:
        preference: cloud
      assert:
        - field: content.0.text
          op: contains
          value: "cloud"

    - name: get-deployment-guide-onprem
      tool: get_deployment_guide
      difficulty: simple
      args:
