          op: exists

    - name: create-dashboard
      tool: create_dashboard
      difficulty: simple
      args:
        title: "Test Dashboard"
      assert:
        - field: content.0.text
          op: exists

    - name: create-iot-dashboard
      tool: create_iot_dashboard
      difficulty: simple
      args:
        index_pattern: "metrics-generic.otel-*"
      expect_error: true
      assert:
