- name: integration-gateway-tools
  layer: integration
  require_env: [ES_URL]
  defaults:
    timeout: 30000
  tests:
    - name: es-cluster-health
      tool: elasticsearch_api
      difficulty: simple
      args:
        method: GET
        path: /_cluster/health
      assert:
        - field: content.0.text
          op: exists
        - field: content.0.text
          op: contains
          value: "cluster_name"

    - name: es-cat-indices
      tool: elasticsearch_api
      difficulty: simple
      args:
        method: GET
        path: /_cat/indices?format=json
      assert:
        - field: content.0.text
          op: exists

    - name: es-cluster-info
      tool: elasticsearch_api
      difficulty: simple
      args:
        method: GET
        path: /
      assert:
        - field: content.0.text
          op: contains
          value: "version"

    - name: esql-simple-query
      tool: esql_query
      difficulty: simple
      args:
        query: "SHOW INFO"
      assert:
        - field: content.0.text
          op: exists

    - name: es-invalid-path-errors
      tool: elasticsearch_api
      difficulty: moderate
      args:
        method: GET
        path: /___nonexistent_test_index___/_search
      expect_error: true

