      warmup: 2
      iterations: 10
      thresholds:
        p95: 5000

    - name: create-agent-builder-agent-latency
      tool: create_agent_builder_agent
      difficulty: moderate
      args:
        id: "perf-test-agent"
        name: "Perf Test Agent"
        description: "Performance test agent"
