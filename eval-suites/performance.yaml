- name: performance-gateway
  layer: performance
  require_env: [ES_URL]
  tests:
    - name: cluster-health-latency
      tool: elasticsearch_api
      difficulty: simple
      args:
        method: GET
        path: /_cluster/health
      warmup: 3
      iterations: 20
      thresholds:
        p50: 200
        p95: 1000
        p99: 2000

    - name: cat-indices-latency
      tool: elasticsearch_api
      difficulty: simple
      args:
        method: GET
        path: /_cat/indices?format=json
      warmup: 2
      iterations: 15
      thresholds:
        p50: 300
        p95: 1500

    - name: esql-query-latency
      tool: esql_query
      difficulty: simple
      args:
        query: "SHOW INFO"
      warmup: 2
      iterations: 15
      thresholds:
        p50: 500
        p95: 2000

