    timeout: 180000
  tests:
    - name: iterative-discovery-conversation
      type: conversation
      difficulty: moderate
      prompt: "What data do I have in my cluster?"
      expected:
        tools: [discover_data]
      evaluators:
        - tool-selection
        - conversation-coherence
      max_turns: 10
      turns:
        - prompt: "Now show me the observability data specifically"
          expected:
            tools: [discover_o11y_data]
          evaluators:
            - tool-selection
        - prompt: "Can you summarize what you found?"
          expected:
            response_contains: []
          evaluators:
            - response-quality

