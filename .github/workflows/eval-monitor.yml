name: Eval Quality Monitor

on:
  schedule:
    # Run daily at 6am UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      max_iterations:
        description: "Max improvement iterations"
        required: false
        default: "3"
        type: string

concurrency:
  group: eval-monitor
  cancel-in-progress: true

jobs:
  eval-monitor:
    name: Run Evals & Detect Regressions
    runs-on: ubuntu-latest
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0-SNAPSHOT
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          xpack.security.enabled: "true"
          ELASTIC_PASSWORD: changeme
          ES_JAVA_OPTS: -Xms1g -Xmx1g
          xpack.security.http.ssl.enabled: "false"
          xpack.license.self_generated.type: trial
        options: >-
          --health-cmd "curl -sf -u elastic:changeme http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Seed test data
        env:
          ES_URL: http://localhost:9200
          ES_USERNAME: elastic
          ES_PASSWORD: changeme
        run: bash scripts/seed-test-data.sh

      - name: Run full CI evals
        id: evals
        env:
          ES_URL: http://localhost:9200
          ES_USERNAME: elastic
          ES_PASSWORD: changeme
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_URL: ${{ secrets.LITELLM_URL }}
        run: |
          set +e
          OUTPUT=$(npx cursor-plugin-evals run --config plugin-eval.yaml --ci --verbose 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Extract key metrics
          PASS_RATE=$(echo "$OUTPUT" | grep -oP '\d+\.\d+% pass rate' | head -1 || echo "unknown")
          echo "pass_rate=$PASS_RATE" >> "$GITHUB_OUTPUT"

          # Save full output for artifact
          echo "$OUTPUT" > eval-results.txt
          exit $EXIT_CODE

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_number }}
          path: |
            eval-results.txt
            .cursor-plugin-evals/

      - name: Create issue on regression
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('eval-results.txt', 'utf8');
            const failureSection = results.match(/Failure Details[\s\S]*?(?=Confidence Intervals)/)?.[0] || 'No failure details found';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Eval regression detected (${new Date().toISOString().split('T')[0]})`,
              body: `## Eval Regression Detected\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n### Failure Details\n\`\`\`\n${failureSection}\n\`\`\`\n\n### Next Steps\n1. Run \`/eval-improve-loop\` in Cursor to auto-fix\n2. Or manually inspect and fix the failures\n`,
              labels: ['eval-regression', 'automated']
            });
