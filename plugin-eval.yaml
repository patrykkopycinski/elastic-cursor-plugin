plugin:
  name: elastic-developer-experience
  dir: .
  plugin_root: .
  build_command: npm run build
  entry: packages/mcp-server/dist/index.js
  env:
    ES_URL: "${ES_URL}"
    ES_USERNAME: "${ES_USERNAME}"
    ES_PASSWORD: "${ES_PASSWORD}"
    KIBANA_URL: "${KIBANA_URL}"

defaults:
  timeout: 30000
  judge_model: llm-gateway/gpt-5.4
  repetitions: 1
  thresholds:
    threshold: 0.8

scoring:
  weights:
    static: 0.5
    unit: 0.8
    integration: 1.0
    llm: 1.0
    performance: 0.5

ci:
  score:
    avg: 0.88
  latency:
    p95: 45000
  evaluators:
    tool-selection:
      avg: 0.82
    security:
      min: 1.0
  required_pass:
    - tool-poisoning
    - security
  first_try_pass_rate: 0.85
  phase_gate:
    first_try_pass_rate: 0.80
    e2e_completion_rate: 0.80
    description: "Production readiness gate for marketplace distribution"

suites:
  - ./eval-suites/static.yaml
  - ./eval-suites/unit.yaml
  - ./eval-suites/integration.yaml
  - ./eval-suites/llm.yaml
  - ./eval-suites/performance.yaml
